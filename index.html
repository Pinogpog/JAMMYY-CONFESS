<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Confession — Jammy</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg1:#ffd8e6;
            --bg2:#fff4f8;
            --bg3:#ffe9cf;
            --bg4:#f8dfff;
            --card:#ffffff;
            --accent:#ff5d87;
            --accent2:#ff8fb1;
            --rose:#ff6f91;
        }
        html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
        body{
            background:
                radial-gradient(circle at 15% 18%, rgba(255,120,140,0.24), transparent 18%),
                radial-gradient(circle at 85% 12%, rgba(255,200,130,0.26), transparent 20%),
                radial-gradient(circle at 50% 100%, rgba(198,139,255,0.18), transparent 24%),
                linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 45%,var(--bg3) 100%);
            display:grid;place-items:center;padding:48px;position:relative;overflow:hidden;
        }
        body::before,
        body::after{
            content:"";
            position:absolute;inset:0;pointer-events:none;
        }
        body::before{
            background-image:
                radial-gradient(circle, rgba(255,111,145,0.18) 0 7px, transparent 8px),
                radial-gradient(circle, rgba(255,255,255,0.78) 0 5px, transparent 6px);
            background-size:180px 180px,220px 220px;
            background-position:0 0,40px 70px;
            opacity:0.8;
            mix-blend-mode:multiply;
        }
        body::after{
            background-image:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.55) 0 4px, transparent 5px),
                radial-gradient(circle at 75% 30%, rgba(255,130,160,0.24) 0 8px, transparent 9px),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.35) 0 5px, transparent 6px);
            background-size:260px 260px,320px 320px,300px 300px;
            opacity:0.7;
        }
        .scene{width:min(720px,96%);max-width:720px;position:relative;z-index:1}
        .card{
            background:linear-gradient(180deg,rgba(255,255,255,0.96),#fffdfd);
            border-radius:24px;padding:36px 36px;box-shadow:0 22px 60px rgba(120,35,58,0.16);border:1px solid rgba(255,111,145,0.2);position:relative;overflow:hidden;
        }
        .card::before,
        .card::after{
            content:"";
            position:absolute;pointer-events:none;border-radius:50%;filter:blur(4px);
        }
        .card::before{
            inset:-20% 66% auto auto;width:220px;height:220px;background:radial-gradient(circle, rgba(255,118,150,0.16) 0%, transparent 70%);
        }
        .card::after{
            inset:auto auto -10% -8%;width:240px;height:240px;background:radial-gradient(circle, rgba(255,205,120,0.16) 0%, transparent 70%);
        }
        .header{display:flex;align-items:center;gap:16px}
        .logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#ff8aa2);display:grid;place-items:center;color:white;font-weight:700;font-family:'Dancing Script',cursive;font-size:24px}
        h1{margin:0;font-family:'Dancing Script',cursive;font-size:34px;color:#5a1226}
        p.lead{margin:8px 0 18px;color:#6b3340}
        .rose-decor{display:flex;gap:8px;justify-content:center;margin:8px 0 10px;font-size:20px;opacity:.9}
        .rose-decor span{display:inline-block;animation:sway 2.6s ease-in-out infinite}
        .rose-decor span:nth-child(2){animation-delay:.4s}
        .rose-decor span:nth-child(3){animation-delay:.8s}
        .creator{margin-top:16px;text-align:center;font-size:13px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:#9a4460}
        @keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(8deg)}}

        /* Reveal area */
        .confess-area{background:linear-gradient(180deg,#fff6f8,#fff);border-radius:12px;padding:22px;min-height:120px;display:flex;align-items:center;justify-content:center;position:relative}
        .placeholder{color:#b35a6f}
        .message{font-family:'Dancing Script',cursive;font-size:22px;color:#8b0f3a;line-height:1.4;max-width:640px;white-space:pre-wrap}

        .controls{display:flex;gap:12px;justify-content:center;margin-top:20px}
        button.btn{background:var(--accent);color:white;border:none;padding:10px 16px;border-radius:10px;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(255,71,111,0.18)}
        button.btn.alt{background:transparent;border:2px solid rgba(139,15,58,0.12);color:#671731}

        /* floating hearts */
        .hearts span{position:absolute;left:50%;transform:translateX(-50%);bottom:-40px;width:18px;height:18px;background:var(--accent);clip-path:path('M10 3c-1.7-2-5-1.6-6.6.3-1.9 2.4-1.2 6.2 1.6 8.6L10 23l3-10.1c2.8-2.4 3.5-6.2 1.6-8.6C15 1.4 11.7 1 10 3z');opacity:0.9}
        .heart{position:absolute;pointer-events:none}
        @keyframes floatUp{0%{transform:translate(-50%,0) scale(0.8);opacity:0}10%{opacity:1}100%{transform:translate(-50%,-380px) scale(1.1);opacity:0}}
        .heart:nth-child(1){left:20%;animation:floatUp 6s linear infinite;animation-delay:0s}
        .heart:nth-child(2){left:45%;animation:floatUp 5.2s linear infinite;animation-delay:0.6s}
        .heart:nth-child(3){left:70%;animation:floatUp 6.7s linear infinite;animation-delay:1.2s}

        /* typing cursor */
        .cursor{display:inline-block;width:6px;height:1.2em;background:#8b0f3a;margin-left:6px;vertical-align:bottom;animation:blink 1s steps(2) infinite}
        @keyframes blink{50%{opacity:0}}

        /* small responsive tweaks */
        @media (max-width:420px){h1{font-size:28px}.message{font-size:20px}}
        /* extra floating-heart styles */
        .floating-heart{position:fixed;pointer-events:none;z-index:9999;width:18px;height:18px;transform:translate(-50%,0);opacity:0;filter:drop-shadow(0 6px 10px rgba(195,45,75,0.14));}
        @keyframes riseHeart{0%{transform:translate(-50%,0) scale(0.9);opacity:0}10%{opacity:1}100%{transform:translate(-50%,-420px) scale(1.15);opacity:0}}
    </style>
</head>
<body>
    <div class="scene">
        <div class="card">
            <div class="header">
                <div class="logo">❤︎</div>
                <div>
                    <h1>I have something to say Seann</h1>
                    <p class="lead">Since this is a website, I guess for me it was love at first sight</p>
                </div>
            </div>

            <div class="confess-area" id="confess">
                <div class="placeholder" id="placeholder">You're the reason this page looks sweeter.</div>
                <div class="message" id="message" aria-hidden="true" style="display:none"></div>
            </div>

            <div class="rose-decor" aria-hidden="true">
                <span>🌹</span><span>🌹</span><span>🌹</span>
            </div>

            <div class="controls">
                <button class="btn" id="reveal">Reveal ❤️</button>
                <button class="btn alt" id="reset">Again 💌</button>
            </div>

            <div class="heart" style="pointer-events:none;">
                <svg width="0" height="0" viewBox="0 0 24 24" style="position:absolute">
                    <defs>
                        <path id="p" d="M12 21s-7-4.35-9-7.5C-0.5 8.5 4.5 3 7 5.5c1.5 1.4 2.2 3.4 5 3.4s3.5-2 5-3.4C19.5 3 24.5 8.5 21 13.5 19 16.65 12 21 12 21z"/>
                    </defs>
                </svg>
            </div>

            <div class="hearts" aria-hidden="true">
                <svg class="heart" style="left:20%" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.35-9-7.5C-0.5 8.5 4.5 3 7 5.5c1.5 1.4 2.2 3.4 5 3.4s3.5-2 5-3.4C19.5 3 24.5 8.5 21 13.5 19 16.65 12 21 12 21z" fill="#ff6b87" opacity="0.9"/></svg>
                <svg class="heart" style="left:45%" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.35-9-7.5C-0.5 8.5 4.5 3 7 5.5c1.5 1.4 2.2 3.4 5 3.4s3.5-2 5-3.4C19.5 3 24.5 8.5 21 13.5 19 16.65 12 21 12 21z" fill="#ff4b6b" opacity="0.95"/></svg>
                <svg class="heart" style="left:70%" width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.35-9-7.5C-0.5 8.5 4.5 3 7 5.5c1.5 1.4 2.2 3.4 5 3.4s3.5-2 5-3.4C19.5 3 24.5 8.5 21 13.5 19 16.65 12 21 12 21z" fill="#ff2e55" opacity="0.92"/></svg>
            </div>

            <div class="creator">Created by JAMMYY</div>
        </div>
    </div>

    <script>
        const revealBtn = document.getElementById('reveal');
        const resetBtn = document.getElementById('reset');
        const placeholder = document.getElementById('placeholder');
        const messageEl = document.getElementById('message');

        const confession = `I like you more than you know.\nEvery time when i see you, my heart skips a beat.\nI love your personality, the way you smile, your vibe...it just makes everything better.`;

        let typing;

        function typeText(text, el, speed=40){
            el.style.display = 'inline-block';
            el.textContent = '';
            let i = 0;
            return new Promise(resolve=>{
                typing = setInterval(()=>{
                    el.textContent += text[i] || '';
                    i++;
                    if(i>text.length){
                        clearInterval(typing);
                        typing = null;
                        resolve();
                    }
                }, speed);
            });
        }

        revealBtn.addEventListener('click', async ()=>{
            if(typing) return; // avoid double-trigger
            placeholder.style.display = 'none';
            messageEl.style.display = 'block';
            messageEl.textContent = '';
            await typeText(confession, messageEl, 40);
            // append a soft cursor block
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            messageEl.appendChild(cursor);
            // spawn some floating hearts for a romantic reveal
            try{ spawnHearts(10); }catch(e){/* ignore if function missing */}
        });

        resetBtn.addEventListener('click', ()=>{
            if(typing) clearInterval(typing);
            messageEl.style.display = 'none';
            messageEl.textContent = '';
            placeholder.style.display = 'block';
            // remove any floating hearts
            document.querySelectorAll('.floating-heart').forEach(h=>h.remove());
        });

        // create floating hearts that rise and fade
        function spawnHearts(count=6){
            for(let i=0;i<count;i++){
                const svgNS = 'http://www.w3.org/2000/svg';
                const el = document.createElement('div');
                el.className = 'floating-heart';
                const left = Math.random()*100;
                el.style.left = left + '%';
                const dur = (4 + Math.random()*3).toFixed(2) + 's';
                el.style.animation = `riseHeart ${dur} linear forwards`;
                // create tiny heart SVG
                const svg = document.createElementNS(svgNS,'svg');
                svg.setAttribute('viewBox','0 0 24 24');
                svg.setAttribute('width','18');
                svg.setAttribute('height','18');
                const path = document.createElementNS(svgNS,'path');
                path.setAttribute('d','M12 21s-7-4.35-9-7.5C-0.5 8.5 4.5 3 7 5.5c1.5 1.4 2.2 3.4 5 3.4s3.5-2 5-3.4C19.5 3 24.5 8.5 21 13.5 19 16.65 12 21 12 21z');
                path.setAttribute('fill',['#ff6b87','#ff4b6b','#ff2e55'][Math.floor(Math.random()*3)]);
                svg.appendChild(path);
                el.appendChild(svg);
                document.body.appendChild(el);
                // remove after animation
                el.addEventListener('animationend',()=>el.remove());
            }
        }
    </script>
</body>
</html>
